<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加密文章密码管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        .card-hover:hover { transform: translateY(-2px); transition: all 0.2s ease; }
        .copy-btn { cursor: pointer; transition: all 0.2s; }
        .copy-btn:hover { background-color: #3b82f6; color: white; }
    </style>
</head>
<body class="bg-gray-100 p-4 md:p-6">
    <div id="app" class="max-w-5xl mx-auto">
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
            <!-- 头部 -->
            <div class="bg-gradient-to-r from-red-600 to-red-700 px-6 py-5">
                <h1 class="text-2xl md:text-3xl font-bold text-white flex items-center gap-2">
                    <i class="fas fa-key"></i> 加密文章密码管理
                </h1>
                <p class="text-red-100 text-sm mt-1">查看所有加密文章的当前密码（数据实时从 GitHub 读取）</p>
            </div>

            <!-- 配置区域 -->
            <div class="p-4 border-b bg-gray-50">
                <div class="flex flex-col md:flex-row gap-4 items-end">
                    <div class="flex-1">
                        <label class="block text-sm font-medium text-gray-700 mb-1">GitHub Token</label>
                        <input type="password" v-model="githubToken" class="w-full border rounded-lg px-3 py-2 text-sm" placeholder="ghp_xxxxxxxxxxxx">
                        <p class="text-xs text-gray-500 mt-1">需要 <code>repo</code> 权限。 <a href="https://github.com/settings/tokens/new?scopes=repo" target="_blank" class="text-blue-600">点击创建 Token</a></p>
                    </div>
                    <div class="flex-1">
                        <label class="block text-sm font-medium text-gray-700 mb-1">仓库 (owner/repo)</label>
                        <input v-model="repoName" class="w-full border rounded-lg px-3 py-2 text-sm" placeholder="857d/RyuChan">
                    </div>
                    <div>
                        <button @click="fetchPasswords" :disabled="loading" class="bg-red-600 hover:bg-red-700 text-white px-6 py-2 rounded-lg text-sm font-medium flex items-center gap-2">
                            <i v-if="loading" class="fas fa-spinner fa-spin"></i>
                            {{ loading ? '加载中...' : '读取密码' }}
                        </button>
                    </div>
                </div>
            </div>

            <!-- 提示信息 -->
            <div v-if="message" class="p-3" :class="messageType === 'error' ? 'bg-red-50 text-red-700' : 'bg-green-50 text-green-700'">
                {{ message }}
            </div>

            <!-- 密码列表 -->
            <div v-if="encryptedPosts.length > 0" class="p-4">
                <div class="overflow-x-auto">
                    <table class="min-w-full border-collapse">
                        <thead class="bg-gray-100">
                            <tr>
                                <th class="px-4 py-3 text-left text-sm font-semibold">标题</th>
                                <th class="px-4 py-3 text-left text-sm font-semibold">文章标识 (slug)</th>
                                <th class="px-4 py-3 text-left text-sm font-semibold">当前密码</th>
                                <th class="px-4 py-3 text-left text-sm font-semibold">操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr v-for="post in encryptedPosts" :key="post.slug" class="border-b hover:bg-gray-50">
                                <td class="px-4 py-3 text-sm">{{ post.title }}</td>
                                <td class="px-4 py-3 text-sm font-mono">{{ post.slug }}</td>
                                <td class="px-4 py-3">
                                    <div class="flex items-center gap-2">
                                        <span class="font-mono text-sm bg-gray-100 px-2 py-1 rounded">{{ post.password }}</span>
                                        <button @click="copyPassword(post.password)" class="copy-btn text-xs bg-gray-200 hover:bg-blue-600 hover:text-white px-2 py-1 rounded transition">
                                            <i class="fas fa-copy"></i> 复制
                                        </button>
                                    </div>
                                </td>
                                <td class="px-4 py-3">
                                    <a :href="`https://github.com/${repoName}/blob/main/src/content/blog/${post.slug}.md`" target="_blank" class="text-blue-600 hover:text-blue-800 text-sm">
                                        <i class="fab fa-github"></i> 查看文件
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <p class="text-sm text-gray-500 mt-4">共 {{ encryptedPosts.length }} 篇加密文章</p>
            </div>

            <!-- 空状态 -->
            <div v-else-if="!loading && hasSearched" class="p-8 text-center text-gray-400">
                <i class="fas fa-inbox text-4xl mb-2"></i>
                <p>暂无加密文章</p>
            </div>

            <!-- 加载状态 -->
            <div v-if="loading" class="p-8 text-center text-gray-400">
                <i class="fas fa-spinner fa-spin text-2xl mb-2"></i>
                <p>正在扫描文章...</p>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref } = Vue;

        createApp({
            setup() {
                const githubToken = ref('');
                const repoName = ref('857d/RyuChan');
                const encryptedPosts = ref([]);
                const loading = ref(false);
                const message = ref('');
                const messageType = ref('');
                const hasSearched = ref(false);

                // 从 GitHub 获取文件列表
                async function getFileList(path = 'src/content/blog') {
                    const url = `https://api.github.com/repos/${repoName.value}/contents/${path}`;
                    const response = await fetch(url, {
                        headers: githubToken.value ? { Authorization: `token ${githubToken.value}` } : {}
                    });
                    if (!response.ok) throw new Error(`获取文件列表失败: ${response.status}`);
                    return await response.json();
                }

                // 获取文件内容并解析 frontmatter
                async function getFileContent(filePath) {
                    const url = `https://api.github.com/repos/${repoName.value}/contents/${filePath}`;
                    const response = await fetch(url, {
                        headers: githubToken.value ? { Authorization: `token ${githubToken.value}` } : {}
                    });
                    if (!response.ok) return null;
                    const data = await response.json();
                    const content = atob(data.content);
                    // 简单解析 frontmatter 中的 password
                    const frontmatterMatch = content.match(/^---\n([\s\S]*?)\n---/);
                    if (!frontmatterMatch) return null;
                    const frontmatter = frontmatterMatch[1];
                    const passwordMatch = frontmatter.match(/password:\s*['"]?([^'"\n]+)['"]?/);
                    if (!passwordMatch) return null;
                    return { password: passwordMatch[1].trim() };
                }

                async function fetchPasswords() {
                    if (!repoName.value) {
                        message.value = '请输入仓库名';
                        messageType.value = 'error';
                        return;
                    }
                    loading.value = true;
                    message.value = '';
                    encryptedPosts.value = [];
                    hasSearched.value = true;

                    try {
                        // 获取文章列表
                        const files = await getFileList();
                        const mdFiles = files.filter(f => f.name.endsWith('.md') || f.name.endsWith('.mdx'));
                        
                        const results = [];
                        for (const file of mdFiles) {
                            const slug = file.name.replace(/\.(md|mdx)$/, '');
                            const content = await getFileContent(file.path);
                            if (content && content.password) {
                                // 获取文章标题（从 frontmatter 或文件名）
                                let title = slug;
                                try {
                                    const fileContent = await fetch(file.download_url);
                                    const text = await fileContent.text();
                                    const titleMatch = text.match(/title:\s*['"]?([^'"\n]+)['"]?/);
                                    if (titleMatch) title = titleMatch[1];
                                } catch(e) {}
                                results.push({
                                    slug,
                                    title,
                                    password: content.password,
                                    filePath: file.path
                                });
                            }
                        }
                        encryptedPosts.value = results;
                        if (results.length === 0) {
                            message.value = '未找到加密文章';
                            messageType.value = 'error';
                        } else {
                            message.value = `找到 ${results.length} 篇加密文章`;
                            messageType.value = 'success';
                        }
                    } catch (err) {
                        console.error(err);
                        message.value = '读取失败：' + err.message;
                        messageType.value = 'error';
                    } finally {
                        loading.value = false;
                    }
                }

                function copyPassword(password) {
                    navigator.clipboard.writeText(password);
                    alert('密码已复制: ' + password);
                }

                // 自动加载（如果有 Token 的话）
                if (localStorage.getItem('github_token')) {
                    githubToken.value = localStorage.getItem('github_token');
                    fetchPasswords();
                }

                return {
                    githubToken,
                    repoName,
                    encryptedPosts,
                    loading,
                    message,
                    messageType,
                    hasSearched,
                    fetchPasswords,
                    copyPassword
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
